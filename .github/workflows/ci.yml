name: CI

on: [push]   

jobs:
  build:
    runs-on: ubuntu-latest  
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Installer les dépendances
        run: npm install

      - name: Lancer les tests
        run: npm test
